name: 📊 Actualizar Miembros de Grupos Facebook

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      motivo:
        description: "Motivo de la ejecución manual"
        required: false
        default: "Actualización manual"

jobs:
  fetch-members:
    name: Obtener miembros de grupos
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: 📂 Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🔑 Verificar secrets
        run: |
          if [ -z "${{ secrets.APIFY_TOKEN }}" ]; then
            echo "::error::APIFY_TOKEN no está configurado en los secrets"
            exit 1
          fi
          if [ ! -f "scripts/fetch_members.js" ]; then
            echo "::error::No se encuentra scripts/fetch_members.js"
            exit 1
          fi
          echo "✅ Secrets y script OK"

      - name: 🚀 Ejecutar scraper via Apify
        id: scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          node scripts/fetch_members.js 2>&1 | tee scraper_output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          TOTAL=$(grep "TOTAL MIEMBROS" scraper_output.txt | grep -oE '[0-9,]+' | tail -1 || echo "0")
          CON=$(grep "Con datos:" scraper_output.txt | grep -oE '[0-9]+' | head -1 || echo "0")
          SIN=$(grep "Sin datos:" scraper_output.txt | grep -oE '[0-9]+' | head -1 || echo "0")

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "con_datos=$CON" >> $GITHUB_OUTPUT
          echo "sin_datos=$SIN" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::El scraper falló. Revisa el log adjunto."
            exit 1
          fi

      - name: 📋 Subir log como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          path: |
            scraper_output.txt
            data/apify_raw_*.json
          retention-days: 7
          if-no-files-found: ignore

      - name: 💾 Commit y push de resultados
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if git diff --staged --quiet; then
            echo "ℹ️  Sin cambios en los datos"
          else
            git commit -m "📊 Miembros $(date +'%Y-%m-%d') | Total: ${{ steps.scraper.outputs.total }} | ${{ steps.scraper.outputs.con_datos }}/86 grupos"
            git push
            echo "✅ Datos publicados"
          fi

      - name: 📊 Resumen
        if: always()
        run: |
          echo "## 📊 Resultado - $(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 👥 Total miembros | **${{ steps.scraper.outputs.total }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Con datos | ${{ steps.scraper.outputs.con_datos }}/86 |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚠️ Sin datos | ${{ steps.scraper.outputs.sin_datos }}/86 |" >> $GITHUB_STEP_SUMMARY
          echo "| 🤖 Motivo | ${{ github.event.inputs.motivo || 'Scheduled' }} |" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Notificar fallo
        if: failure()
        run: |
          echo "::error title=Scraper falló::Verifica APIFY_TOKEN y saldo en apify.com"
          echo "Descarga el artifact 'scraper-log' para ver el error completo."
